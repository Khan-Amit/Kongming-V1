<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Kongming Wallet · Real Email OTP</title>
    <style>
        body {
            background: #0a0f1e;
            font-family: system-ui;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            max-width: 550px;
            width: 100%;
            background: #111827cc;
            border-radius: 48px;
            padding: 24px;
            border: 1px solid #2d3a5e;
        }
        h1 { text-align: center; color: white; margin: 0 0 8px; }
        input, button {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            border-radius: 40px;
            border: none;
            font-size: 1rem;
        }
        input { background: #010a1a; border: 1px solid #2f4172; color: #ffdd99; }
        button { background: #3b6ea0; color: white; font-weight: bold; cursor: pointer; }
        .hidden { display: none; }
        .status { color: #88aaff; text-align: center; margin-top: 12px; font-size: 0.8rem; }
        .error-status { color: #ff8888; text-align: center; margin-top: 12px; font-size: 0.8rem; }
        .footer { font-size: 0.65rem; text-align: center; color: #5b6b8e; margin-top: 20px; }
    </style>
</head>
<body>

<!-- REGISTRATION SCREEN -->
<div class="card" id="registerDiv">
    <h1>🔐 Kongming Wallet</h1>
    <input type="email" id="regEmail" placeholder="Email Address" value="amit.khanna.1082@gmail.com">
    <button id="sendOtpBtn">Send OTP via Email</button>
    <input type="text" id="regOtp" placeholder="Enter OTP" class="hidden">
    <button id="verifyOtpBtn" class="hidden">Verify & Request Approval</button>
    <div id="regStatus" class="status"></div>
    <div id="regError" class="error-status"></div>
    <div class="footer">Real email OTP · Admin approved · CSFS secured</div>
</div>

<!-- PENDING APPROVAL SCREEN -->
<div class="card hidden" id="pendingDiv">
    <h1>⏳ Awaiting Approval</h1>
    <p>Your request has been sent to the administrator.</p>
    <p>You will be notified when approved.</p>
    <button id="checkApprovalBtn">Check Status</button>
    <div id="pendingStatus" class="status"></div>
</div>

<!-- MAIN WALLET -->
<div class="card hidden" id="walletDiv">
    <h1>⚡ Kongming</h1>
    <div style="text-align:center; margin:16px 0;">
        <div style="font-size:2rem; color:#ffdd99;" id="balance">100.00</div>
        <div>CSFS Coins</div>
    </div>
    <div class="tabs" style="display:flex; gap:8px;">
        <button id="sendTabBtn" class="active" style="flex:1;">📤 Send</button>
        <button id="receiveTabBtn" style="flex:1;">📥 Receive</button>
    </div>
    <div id="sendPane">
        <input type="text" id="recipientEmail" placeholder="Recipient Email">
        <input type="number" id="amount" placeholder="Amount (CSFS)">
        <button id="sendBtn">Send</button>
    </div>
    <div id="receivePane" class="hidden">
        <div style="text-align:center; padding:16px;">
            <div>Your Email: <strong id="userEmailDisplay"></strong></div>
            <div>Your CSFS ID: <strong id="userIdDisplay"></strong></div>
            <button id="copyIdBtn">📋 Copy ID</button>
        </div>
    </div>
    <div id="walletStatus" class="status"></div>
    <div class="footer">🔐 Email‑bound · CSFS secured · Admin approved</div>
</div>

<script>
    // ========== EMAILJS CONFIGURATION ==========
    // ⚠️ REPLACE THESE THREE VALUES WITH YOUR OWN FROM EMAILJS ⚠️
    const EMAILJS_PUBLIC_KEY = 'user_XXXXXXXXXXXXX';  // 👈 PASTE YOUR PUBLIC KEY HERE
    const EMAILJS_SERVICE_ID = 'service_XXXXXXXX';    // 👈 PASTE YOUR SERVICE ID HERE
    const EMAILJS_TEMPLATE_ID = 'template_XXXXXXXX';  // 👈 PASTE YOUR TEMPLATE ID HERE

    let emailjsReady = false;

    // Load EmailJS dynamically
    function loadEmailJS() {
        return new Promise((resolve, reject) => {
            if (typeof emailjs !== 'undefined') {
                emailjsReady = true;
                resolve();
                return;
            }
            const script = document.createElement('script');
            script.src = 'https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js';
            script.onload = () => {
                emailjs.init(EMAILJS_PUBLIC_KEY);
                emailjsReady = true;
                resolve();
            };
            script.onerror = () => reject(new Error('Failed to load EmailJS library'));
            document.head.appendChild(script);
        });
    }

    // Helper: generate random 6-digit OTP
    function generateOtp() { return Math.floor(100000 + Math.random() * 900000).toString(); }

    // ========== STORAGE ==========
    const STORAGE_PREFIX = 'kongming_';
    let currentEmail = null;
    let currentOtp = null;
    let lastOtpSent = 0;

    function requestApproval(email) {
        const request = { email, timestamp: Date.now(), status: 'pending' };
        localStorage.setItem(STORAGE_PREFIX + 'pending_' + email, JSON.stringify(request));
        const adminQueue = JSON.parse(localStorage.getItem(STORAGE_PREFIX + 'admin_queue') || '[]');
        adminQueue.push(request);
        localStorage.setItem(STORAGE_PREFIX + 'admin_queue', JSON.stringify(adminQueue));
        return request;
    }

    function isApproved(email) {
        const approved = JSON.parse(localStorage.getItem(STORAGE_PREFIX + 'approved_users') || '[]');
        return approved.includes(email);
    }

    // Send OTP via EmailJS or fallback to simulated
    async function sendOtpToEmail(email, otp) {
        const statusDiv = document.getElementById('regStatus');
        const errorDiv = document.getElementById('regError');

        if (!emailjsReady) {
            errorDiv.innerText = '❌ EmailJS not ready. Using SIMULATED mode. Check console.';
            console.log(`[SIMULATED] OTP for ${email}: ${otp}`);
            statusDiv.innerText = `⚠️ SIMULATED MODE: Your OTP is ${otp} (check console)`;
            return true;
        }

        try {
            const templateParams = {
                to_email: email,
                otp: otp
            };
            await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, templateParams);
            statusDiv.innerText = '✅ OTP sent to your email. Check spam folder.';
            errorDiv.innerText = '';
            return true;
        } catch (err) {
            console.error('EmailJS error:', err);
            errorDiv.innerText = `❌ Email send failed: ${err.text || err.message || 'Unknown error'}. Using SIMULATED mode.`;
            console.log(`[SIMULATED] OTP for ${email}: ${otp}`);
            statusDiv.innerText = `⚠️ SIMULATED MODE: Your OTP is ${otp}`;
            return false;
        }
    }

    // ========== EVENT HANDLERS ==========
    document.getElementById('sendOtpBtn').addEventListener('click', async () => {
        const email = document.getElementById('regEmail').value.trim();
        if (!email || !email.includes('@')) { alert('Enter valid email address'); return; }
        currentEmail = email;
        currentOtp = generateOtp();

        document.getElementById('regStatus').innerText = 'Sending OTP...';
        document.getElementById('regError').innerText = '';

        await sendOtpToEmail(currentEmail, currentOtp);

        document.getElementById('regOtp').classList.remove('hidden');
        document.getElementById('verifyOtpBtn').classList.remove('hidden');
    });

    document.getElementById('verifyOtpBtn').addEventListener('click', () => {
        const enteredOtp = document.getElementById('regOtp').value.trim();
        if (enteredOtp !== currentOtp) { alert('Invalid OTP'); return; }
        requestApproval(currentEmail);
        document.getElementById('registerDiv').classList.add('hidden');
        document.getElementById('pendingDiv').classList.remove('hidden');
        document.getElementById('pendingStatus').innerText = 'Request sent to admin.';
    });

    document.getElementById('checkApprovalBtn').addEventListener('click', () => {
        if (!currentEmail) return;
        if (isApproved(currentEmail)) {
            document.getElementById('pendingDiv').classList.add('hidden');
            document.getElementById('walletDiv').classList.remove('hidden');
            const balance = localStorage.getItem(STORAGE_PREFIX + currentEmail + '_balance') || '100.00';
            document.getElementById('balance').innerText = balance;
            document.getElementById('userEmailDisplay').innerText = currentEmail;
            document.getElementById('userIdDisplay').innerText = 'kongming_' + currentEmail.split('@')[0];
            document.getElementById('walletStatus').innerText = '✅ Wallet active';
        } else {
            document.getElementById('pendingStatus').innerText = 'Still pending admin approval.';
        }
    });

    // Tabs
    document.getElementById('sendTabBtn').addEventListener('click', () => {
        document.getElementById('sendPane').classList.remove('hidden');
        document.getElementById('receivePane').classList.add('hidden');
        document.getElementById('sendTabBtn').classList.add('active');
        document.getElementById('receiveTabBtn').classList.remove('active');
    });
    document.getElementById('receiveTabBtn').addEventListener('click', () => {
        document.getElementById('sendPane').classList.add('hidden');
        document.getElementById('receivePane').classList.remove('hidden');
        document.getElementById('sendTabBtn').classList.remove('active');
        document.getElementById('receiveTabBtn').classList.add('active');
    });

    // Send CSFS
    document.getElementById('sendBtn').addEventListener('click', () => {
        const recipient = document.getElementById('recipientEmail').value.trim();
        const amount = parseFloat(document.getElementById('amount').value);
        if (!recipient || isNaN(amount)) { alert('Enter recipient email and amount'); return; }
        let balance = parseFloat(document.getElementById('balance').innerText);
        if (amount > balance) { alert('Insufficient balance'); return; }
        balance -= amount;
        document.getElementById('balance').innerText = balance.toFixed(2);
        localStorage.setItem(STORAGE_PREFIX + currentEmail + '_balance', balance.toFixed(2));
        document.getElementById('walletStatus').innerHTML = `✅ Sent ${amount} CSFS to ${recipient}`;
        setTimeout(() => document.getElementById('walletStatus').innerHTML = '', 3000);
        document.getElementById('amount').value = '';
    });

    document.getElementById('copyIdBtn').addEventListener('click', () => {
        const id = document.getElementById('userIdDisplay').innerText;
        navigator.clipboard.writeText(id);
        alert('CSFS ID copied');
    });

    // Initialize EmailJS on page load
    loadEmailJS().catch(err => {
        console.error('EmailJS init failed:', err);
        document.getElementById('regError').innerText = '⚠️ EmailJS not loaded. Using SIMULATED mode only.';
    });
</script>
</body>
</html>
